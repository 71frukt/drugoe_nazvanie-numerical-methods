name: CI Build

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build_and_test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # - name: Set up Python
    #   uses: actions/setup-python@v5
    #   with:
    #     python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libfmt-dev graphviz cmake

    - name: Configure CMake
      run: >
        cmake -B build 
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} 
        -DONNX_ROOT=${{ github.workspace }}/onnx-install

    - name: Build project
      run: cmake --build build --config ${{ matrix.build_type }} -j $(nproc)

    # - name: Run tests
    #   run: ctest --test-dir build --output-on-failure -V -C ${{ matrix.build_type }}
    #   env:
    #     LD_LIBRARY_PATH: ${{ github.workspace }}/onnx-install/lib:${{ github.workspace }}/onnx-install/lib64:${{ env.LD_LIBRARY_PATH }}