name: CI Build

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        project: [task7_LogImpl]
        build_type: [Release, Debug]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libfmt-dev graphviz cmake

    - name: Configure CMake
      run: cmake -S ${{ matrix.project }} -B ${{ matrix.project }}/build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

    - name: Build project
      run: cmake --build ${{ matrix.project }}/build --config ${{ matrix.build_type }} -j $(nproc)

    # - name: Run tests
      # run: ctest --test-dir ${{ matrix.project }}/build --output-on-failure -V -C ${{ matrix.build_type }}